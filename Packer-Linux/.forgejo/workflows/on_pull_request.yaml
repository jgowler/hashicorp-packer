on:
  pull_request:
    paths:
      - "Packer-Linux/**"

jobs:
  validate-build:
    runs-on: docker

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install curl and wget
        run: |
          sudo apt update && sudo apt install -y curl wget
          wget --version
          curl --version

      - name: Install HashiCorp Packer
        run: |
          set -e

          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
          https://apt.releases.hashicorp.com $(lsb_release -cs) main" | \
          sudo tee /etc/apt/sources.list.d/hashicorp.list

          sudo apt-get update
          sudo apt-get install -y packer

          packer --version

      - name: Packer validate
        run: |
          packer init Packer-Linux/
          packer validate Packer-Linux/
